name: Generate Weekly/Monthly Review

on:
  schedule:
    # 금요일 오후 4시 (주간 리뷰) - KST
    - cron: '0 7 * * 5'  # UTC 07:00 = KST 16:00
    # 매월 1일 오전 9시 (월간 리뷰, 전월 리뷰) - KST
    - cron: '0 0 1 * *'  # UTC 00:00 = KST 09:00
  workflow_dispatch:
    inputs:
      review_type:
        description: '리뷰 유형'
        required: true
        default: 'weekly_review'
        type: choice
        options:
          - weekly_review
          - monthly_review

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  weekly:
    if: github.event.schedule == '0 7 * * 5' || github.event.inputs.review_type == 'weekly_review'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./tools/stock-researcher
          pip install -e ./tools/content-generator

      - name: Generate weekly review
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          WEEK=$(TZ=Asia/Seoul date +%V)

          echo "Generating weekly review for week ${WEEK}..."

          python -m content_generator.cli generate \
            --type weekly_review \
            --output posts/

          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "week=${WEEK}" >> $GITHUB_OUTPUT

      - name: Update sidebar
        run: |
          python scripts/update_sidebar.py || echo "Sidebar update script not found, skipping..."

      - name: Update sitemap
        run: |
          python scripts/update_sitemap.py || echo "Sitemap update script not found, skipping..."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ _sidebar.md sitemap.xml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "content: weekly review for week ${{ steps.generate.outputs.week }}"
          git push origin main

  monthly:
    if: github.event.schedule == '0 0 1 * *' || github.event.inputs.review_type == 'monthly_review'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./tools/stock-researcher
          pip install -e ./tools/content-generator

      - name: Generate monthly review
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          PREV_MONTH=$(TZ=Asia/Seoul date -d "1 month ago" +%Y-%m)

          echo "Generating monthly review for ${PREV_MONTH}..."

          python -m content_generator.cli generate \
            --type monthly_review \
            --output posts/

          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "month=${PREV_MONTH}" >> $GITHUB_OUTPUT

      - name: Update sidebar
        run: |
          python scripts/update_sidebar.py || echo "Sidebar update script not found, skipping..."

      - name: Update sitemap
        run: |
          python scripts/update_sitemap.py || echo "Sitemap update script not found, skipping..."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ _sidebar.md sitemap.xml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "content: monthly review for ${{ steps.generate.outputs.month }}"
          git push origin main
