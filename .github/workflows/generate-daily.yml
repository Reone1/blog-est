name: Generate Daily Content

on:
  schedule:
    # 한국 시간 오후 4시 (장마감 후) - 평일만
    - cron: '0 7 * * 1-5'  # UTC 07:00 = KST 16:00
  workflow_dispatch:
    inputs:
      content_type:
        description: '콘텐츠 유형'
        required: true
        default: 'daily_briefing'
        type: choice
        options:
          - daily_briefing
          - std_analysis
          - sector_analysis

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./tools/stock-researcher
          pip install -e ./tools/content-generator

      - name: Verify data access
        run: |
          python -c "
          from stock_researcher import get_market_summary
          s = get_market_summary('KOSPI')
          print(f'KOSPI: {s.index_value:,.2f} ({s.index_change_percent:+.2f}%)')
          assert s.index_value > 0, 'KOSPI 지수 데이터 조회 실패'
          print('Data access OK')
          "

      - name: Generate content
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CONTENT_TYPE="${{ github.event.inputs.content_type || 'daily_briefing' }}"
          DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)

          echo "Generating ${CONTENT_TYPE} for ${DATE}..."

          python -m content_generator.cli generate \
            --type "${CONTENT_TYPE}" \
            --output posts/

          # 스케줄 트리거일 때 std_analysis도 함께 생성
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${CONTENT_TYPE}" = "daily_briefing" ]; then
            echo "Generating std_analysis for ${DATE}..."
            python -m content_generator.cli generate \
              --type std_analysis \
              --output posts/
          fi

          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "content_type=${CONTENT_TYPE}" >> $GITHUB_OUTPUT

      - name: Generate charts
        run: |
          pip install matplotlib
          python scripts/generate_charts.py || echo "Chart generation failed, skipping..."

      - name: Update sidebar
        run: python scripts/update_sidebar.py || echo "Skipping..."

      - name: Update sitemap
        run: python scripts/update_sitemap.py || echo "Skipping..."

      - name: Update home
        run: python scripts/update_home.py || echo "Skipping..."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ assets/ _sidebar.md sitemap.xml home.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "content: ${{ steps.generate.outputs.content_type }} for ${{ steps.generate.outputs.date }}"
          git push origin main
