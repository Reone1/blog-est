name: Generate Daily Content

on:
  schedule:
    # 한국 시간 오후 4시 (장마감 후) - 평일만
    - cron: '0 7 * * 1-5'  # UTC 07:00 = KST 16:00
  workflow_dispatch:
    inputs:
      content_type:
        description: '콘텐츠 유형'
        required: true
        default: 'daily_briefing'
        type: choice
        options:
          - daily_briefing
          - std_analysis

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./tools/stock-researcher
          pip install -e ./tools/content-generator

      - name: Generate content
        id: generate
        env:
          # API Key가 없으면 Claude CLI 모드로 자동 전환
          # Claude Code Max 사용자: ANTHROPIC_API_KEY 대신 CLI 인증 사용 가능
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CONTENT_TYPE="${{ github.event.inputs.content_type || 'daily_briefing' }}"
          DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)

          echo "Generating ${CONTENT_TYPE} for ${DATE}..."

          python -m content_generator.cli generate \
            --type "${CONTENT_TYPE}" \
            --output posts/

          # 스케줄 트리거일 때 std_analysis도 함께 생성
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${CONTENT_TYPE}" = "daily_briefing" ]; then
            echo "Generating std_analysis for ${DATE}..."
            python -m content_generator.cli generate \
              --type std_analysis \
              --output posts/
          fi

          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "content_type=${CONTENT_TYPE}" >> $GITHUB_OUTPUT

      - name: Update sidebar
        run: |
          python scripts/update_sidebar.py || echo "Sidebar update script not found, skipping..."

      - name: Update sitemap
        run: |
          python scripts/update_sitemap.py || echo "Sitemap update script not found, skipping..."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ _sidebar.md sitemap.xml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "content: ${{ steps.generate.outputs.content_type }} for ${{ steps.generate.outputs.date }}"
          git push origin main
