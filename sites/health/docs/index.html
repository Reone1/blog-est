  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css" />
  <link rel="stylesheet" href="styles.css" />
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Blog",
      "name": "Wellness Lab",
      "url": "https://healthem.vercel.app/",
      "inLanguage": "en",
      "description": "Evidence-based guides on healthy eating, stretching routines, exercise for beginners, and daily habits.",
      "publisher": {
        "@type": "Organization",
        "name": "Wellness Lab"
      }
    }
  </script>
</head>
<body>
  <div id="app">Loading...</div>

  <script>
    window.$docsify = {
      name: 'Wellness Lab',
      repo: '',
      loadSidebar: '_sidebar.md',
      coverpage: false,
      homepage: 'home.md',
      subMaxLevel: 3,
      auto2top: true,
      search: 'auto',
      relativePath: false,
      themeColor: '#16a34a',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(content) {
            var meta = {};
            content = content.replace(/^---\n([\s\S]*?)\n---\s*\n/, function(match, fm) {
              fm.split('\n').forEach(function(line) {
                var idx = line.indexOf(':');
                if (idx > 0) {
                  var key = line.substring(0, idx).trim();
                  var value = line.substring(idx + 1).trim().replace(/^["']|["']$/g, '');
                  meta[key] = value;
                }
              });
              return '';
            });

            var isArticle = meta.date || meta.type;
            if (isArticle) {
              var wordCount = content.replace(/<[^>]*>/g, '').replace(/[#*\[\]()]/g, '').split(/\s+/).length;
              var readingTime = Math.max(1, Math.ceil(wordCount / 230));

              var typeMap = {
                'how-to': 'How-To',
                'explainer': 'Explainer',
                'listicle': 'Listicle',
                'myth-busting': 'Myth Busting',
                'routine': 'Routine'
              };
              var category = typeMap[meta.type] || meta.type || '';

              var metaHtml = '\n<div class="article-meta">' +
                (meta.date ? '<span class="meta-item">' + meta.date + '</span>' : '') +
                (meta.date ? '<span class="meta-separator">&middot;</span>' : '') +
                '<span class="meta-item">' + readingTime + ' min read</span>' +
                (category ? '<span class="meta-separator">&middot;</span><span class="meta-tag">' + category + '</span>' : '') +
                '</div>\n\n';

              content = content.replace(/^(# .+\n)/m, '$1' + metaHtml);
            }

            return content;
          });
        }
      ]
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js" defer></script>

  <!-- Vercel Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
