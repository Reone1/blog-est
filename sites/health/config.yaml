site:
  name: "wellness-science"
  domain: "totalr-health.vercel.app"
  language: "en"
  description: "Evidence-based wellness, nutrition, sleep, and fitness science"

deploy:
  platform: "vercel"
  framework: "docsify"
  root: "./docs"
  base_url: "https://totalr-health.vercel.app"

publish:
  target: "docsify"
  posts_dir: "docs/posts"
  sidebar_file: "docs/_sidebar.md"
  sitemap_file: "docs/sitemap.xml"

schedule:
  content_generation: "0 16 * * *"
  keyword_crawl: "0 0 * * 1"
  report: "0 9 * * 5"

seo:
  sitemap: true
  robots_txt: true
  canonical_base: "https://totalr-health.vercel.app"
