# Health site seed keywords
# Strategy: mixed (evergreen 70% + trending 30%)
#
# Tier:
#   evergreen = 매일 꾸준히 검색되는 건강 기초 지식 (volume 1000+)
#   trending  = 시의성 있는 건강 트렌드/연구 (volume 100+)
#   longtail  = 틈새 롱테일 (volume 100+, KD 낮음)
#
# Priority: P0 (즉시) → P1 (1개월 내) → P2 (3개월 내)
# Status: draft | scheduled | published | updated

