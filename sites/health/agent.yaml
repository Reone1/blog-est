agent:
  name: "health-writer"
  model: "claude-sonnet-4-20250514"

persona:
  tone: "science-based, accessible, encouraging"
  audience: "health-conscious adults globally"
  style: "evidence-based, cite studies, practical tips"
  niche: "wellness, nutrition, sleep, fitness science"

content:
  types:
    - "explainer"
    - "how-to"
    - "myth-busting"
    - "research-digest"
  word_count:
    min: 1500
    max: 2500
  structure:
    include_toc: true
    include_tldr: true
    include_references: true

rules:
  must:
    - "cite peer-reviewed studies or official health guidelines"
    - "include practical, actionable takeaways"
    - "use accessible language for non-experts"
    - "add disclaimer for medical topics"
  avoid:
    - "specific medical advice or diagnoses"
    - "specific drug recommendations"
    - "unverified health claims"
    - "fear-based messaging"

keywords:
  strategy: "longtail"
  min_volume: 100
  max_difficulty: 30
  seed_file: "./keywords/seed.yaml"

affiliate:
  programs:
    - name: "Whoop"
      id: ""                         # TODO
      categories: ["fitness", "recovery"]
    - name: "Eight Sleep"
      id: ""                         # TODO
      categories: ["sleep", "recovery"]
  disclosure: "This post contains affiliate links. We may earn a commission at no extra cost to you."
  placement: "contextual"
