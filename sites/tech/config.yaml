site:
  name: "tech-insights"
  domain: ""                         # TODO: 도메인 설정
  language: "en"
  description: "Data-driven insights on AI, software engineering, and emerging tech"

deploy:
  platform: "vercel"
  framework: "docsify"
  root: "./docs"
  base_url: ""                       # TODO: Vercel 배포 후 설정

publish:
  target: "docsify"
  posts_dir: "docs/posts"
  sidebar_file: "docs/_sidebar.md"
  sitemap_file: "docs/sitemap.xml"

schedule:
  content_generation: "0 16 * * *"   # 매일 16:00 KST
  keyword_crawl: "0 0 * * 1"         # 매주 월요일
  report: "0 9 * * 5"               # 매주 금요일

seo:
  sitemap: true
  robots_txt: true
  canonical_base: ""                 # TODO
