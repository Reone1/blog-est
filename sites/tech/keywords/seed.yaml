# Tech site seed keywords
# Strategy: mixed (evergreen foundational 60% + trending 40%)
#
# Tier:
#   evergreen = 매일 꾸준히 검색되는 기초 지식 (volume 1000+)
#   trending  = 시의성 있는 트렌드/비교 (volume 100+, 성장세)
#   longtail  = 틈새 롱테일 (volume 100+, KD 낮음)
#
# Priority: P0 (즉시, quick wins) → P1 (1개월 내) → P2 (3개월 내)
# Status: draft | scheduled | published | updated

categories:

  # =============================================
  # EVERGREEN — 기초 지식 (높은 검색량, 매일 노출)
